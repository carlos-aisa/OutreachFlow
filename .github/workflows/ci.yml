name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-pr-branch:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate pull request branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" != change/* ]]; then
            echo "Pull request branches must use the format 'change/<change-id-or-short-description>'." >&2
            echo "Current branch: $HEAD_REF" >&2
            exit 1
          fi

  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          $HOME/.dotnet/tools/reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:"coverage-report"
          -reporttypes:"HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub;JsonSummary"
          -assemblyfilters:"+OutreachFlow.*;-*.Tests"

      - name: Publish coverage summary
        run: |
          if [ ! -f coverage-report/SummaryGithub.md ]; then
            echo "Coverage summary was not generated." >&2
            exit 1
          fi

          {
            echo "## Coverage"
            cat coverage-report/SummaryGithub.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: >
          ./scripts/coverage/Update-CoverageBadge.ps1
          -SummaryPath coverage-report/Summary.json
          -OutputPath .github/badges/coverage.json

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -m "ci: update coverage badge [skip ci]"
          git push

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report
          if-no-files-found: error

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage-report/SummaryGithub.md
