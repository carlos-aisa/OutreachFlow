name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          $HOME/.dotnet/tools/reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:"coverage-report"
          -reporttypes:"HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub;JsonSummary"
          -assemblyfilters:"+OutreachFlow.*;-*.Tests"

      - name: Publish coverage summary
        run: |
          if [ ! -f coverage-report/SummaryGithub.md ]; then
            echo "Coverage summary was not generated." >&2
            exit 1
          fi

          {
            echo "## Coverage"
            cat coverage-report/SummaryGithub.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report
          if-no-files-found: error

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage-report/SummaryGithub.md
