name: release openspec change

on:
  workflow_dispatch:
    inputs:
      change_id:
        description: OpenSpec change id, for example p01-core-contacts-model
        required: true
        type: string
      version:
        description: SemVer version without leading v, for example 0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Ensure workflow runs from main
        if: github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          Write-Error "Releases must be created from main. Current ref: $env:GITHUB_REF"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install OpenSpec
        run: npm install --global @fission-ai/openspec@1.3.1

      - name: Validate release inputs
        shell: pwsh
        run: >
          ./scripts/release/Validate-OpenSpecRelease.ps1
          -ChangeId "${{ inputs.change_id }}"
          -Version "${{ inputs.version }}"

      - name: Validate OpenSpec state
        run: openspec validate --all --strict --no-interactive

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Build installer package
        id: package_installer
        shell: pwsh
        run: |
          ./scripts/release/Build-InstallerPackage.ps1 `
            -Version "${{ inputs.version }}"

          $artifactPath = (Resolve-Path "artifacts/installer/OutreachFlow-v${{ inputs.version }}-win-x64-installer.zip").Path
          "artifact_path=$artifactPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate installer package output
        shell: pwsh
        run: |
          ./scripts/release/Validate-InstallerPackage.ps1 `
            -Version "${{ inputs.version }}" `
            -ArtifactPath "${{ steps.package_installer.outputs.artifact_path }}" `
            -ExpectedArchitecture "x64"

      - name: Upload installer package artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-package-v${{ inputs.version }}
          path: ${{ steps.package_installer.outputs.artifact_path }}
          if-no-files-found: error

      - name: Extract release notes
        shell: pwsh
        run: >
          ./scripts/release/Get-ChangelogSection.ps1
          -Version "${{ inputs.version }}"
          -OutputPath release-notes.md

      - name: Create annotated tag
        shell: pwsh
        run: |
          $tag = "v${{ inputs.version }}"

          git rev-parse $tag *> $null
          if ($LASTEXITCODE -eq 0)
          {
              $tagCommit = git rev-list -n 1 $tag
              $headCommit = git rev-parse HEAD

              if ($tagCommit.Trim() -ne $headCommit.Trim())
              {
                  throw "Tag '$tag' already exists but does not point to the current main commit."
              }

              Write-Host "Tag '$tag' already points to the current main commit."
              exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $tag -m "Release $tag"
          git push origin $tag

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "v${{ inputs.version }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0)
          {
              throw "Release '$tag' already exists."
          }

          gh release create $tag `
            --title $tag `
            --notes-file release-notes.md

      - name: Upload installer package to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "v${{ inputs.version }}"
          $artifactPath = "${{ steps.package_installer.outputs.artifact_path }}"

          gh release upload $tag $artifactPath --clobber
