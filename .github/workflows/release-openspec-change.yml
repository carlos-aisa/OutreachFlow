name: release openspec change

on:
  workflow_dispatch:
    inputs:
      change_id:
        description: OpenSpec change id, for example p01-core-contacts-model
        required: true
        type: string
      version:
        description: SemVer version without leading v, for example 0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be created from main. Current ref: $GITHUB_REF" >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install OpenSpec
        run: npm install --global @fission-ai/openspec@1.3.1

      - name: Validate release inputs
        shell: pwsh
        run: >
          ./scripts/release/Validate-OpenSpecRelease.ps1
          -ChangeId "${{ inputs.change_id }}"
          -Version "${{ inputs.version }}"

      - name: Validate OpenSpec state
        run: openspec validate --all --strict --no-interactive

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Extract release notes
        shell: pwsh
        run: >
          ./scripts/release/Get-ChangelogSection.ps1
          -Version "${{ inputs.version }}"
          -OutputPath release-notes.md

      - name: Create annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          tag="v${VERSION}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            head_commit="$(git rev-parse HEAD)"

            if [ "$tag_commit" != "$head_commit" ]; then
              echo "Tag '$tag' already exists but does not point to the current main commit." >&2
              exit 1
            fi

            echo "Tag '$tag' already points to the current main commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          tag="v${VERSION}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release '$tag' already exists." >&2
            exit 1
          fi

          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md
