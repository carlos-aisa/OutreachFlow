openapi: 3.0.3
info:
  title: OutreachFlow API
  version: 0.12.0
  description: API contract for OutreachFlow v1.
servers:
  - url: http://localhost:5131
    description: Local development server
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Returns service health status
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/organizations:
    get:
      operationId: listOrganizations
      summary: Lists organizations ordered by name
      tags:
        - Organizations
      responses:
        "200":
          description: Organizations returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      summary: Creates an organization
      tags:
        - Organizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/organizations/{id}:
    get:
      operationId: getOrganization
      summary: Gets an organization by id
      tags:
        - Organizations
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Organization returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateOrganization
      summary: Updates an organization
      tags:
        - Organizations
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: deleteOrganization
      summary: Deletes an organization
      tags:
        - Organizations
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "204":
          description: Organization deleted successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/contacts:
    get:
      operationId: listContacts
      summary: Lists contacts with optional filters
      tags:
        - Contacts
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Text search against display name, email, or role.
        - name: tagId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContactStatus"
        - name: doNotContact
          in: query
          required: false
          schema:
            type: boolean
        - name: organizationId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: lastContactedFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: lastContactedTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Contacts returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      summary: Creates a contact
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Contact created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/contacts/{id}:
    get:
      operationId: getContact
      summary: Gets a contact by id
      tags:
        - Contacts
      parameters:
        - $ref: "#/components/parameters/ContactId"
      responses:
        "200":
          description: Contact returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateContact
      summary: Updates a contact
      tags:
        - Contacts
      parameters:
        - $ref: "#/components/parameters/ContactId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: Contact updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
    delete:
      operationId: deleteContact
      summary: Deletes a contact
      tags:
        - Contacts
      parameters:
        - $ref: "#/components/parameters/ContactId"
      responses:
        "204":
          description: Contact deleted successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/contacts/{id}/tags/{tagId}:
    post:
      operationId: assignContactTag
      summary: Assigns a tag to a contact
      tags:
        - Contacts
      parameters:
        - $ref: "#/components/parameters/ContactId"
        - $ref: "#/components/parameters/TagId"
      responses:
        "204":
          description: Tag assigned successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: removeContactTag
      summary: Removes a tag from a contact
      tags:
        - Contacts
      parameters:
        - $ref: "#/components/parameters/ContactId"
        - $ref: "#/components/parameters/TagId"
      responses:
        "204":
          description: Tag removed successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/contacts/{id}/activities:
    get:
      operationId: listContactActivities
      summary: Lists activity history for a contact
      tags:
        - Contacts
      parameters:
        - $ref: "#/components/parameters/ContactId"
      responses:
        "200":
          description: Contact activity history returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactActivity"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/tags:
    get:
      operationId: listTags
      summary: Lists tags ordered by category and name
      tags:
        - Tags
      responses:
        "200":
          description: Tags returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      summary: Creates a tag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/tags/{id}:
    get:
      operationId: getTag
      summary: Gets a tag by id
      tags:
        - Tags
      parameters:
        - $ref: "#/components/parameters/TagIdAsId"
      responses:
        "200":
          description: Tag returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateTag
      summary: Updates a tag
      tags:
        - Tags
      parameters:
        - $ref: "#/components/parameters/TagIdAsId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: Tag updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
    delete:
      operationId: deleteTag
      summary: Deletes a tag
      tags:
        - Tags
      parameters:
        - $ref: "#/components/parameters/TagIdAsId"
      responses:
        "204":
          description: Tag deleted successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/sender-profiles:
    get:
      operationId: listSenderProfiles
      summary: Lists sender profiles
      tags:
        - SenderProfiles
      parameters:
        - name: activeOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Sender profiles returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SenderProfile"
    post:
      operationId: createSenderProfile
      summary: Creates a sender profile
      tags:
        - SenderProfiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSenderProfileRequest"
      responses:
        "201":
          description: Sender profile created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenderProfile"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/sender-profiles/default:
    get:
      operationId: getDefaultSenderProfile
      summary: Gets the default active sender profile
      tags:
        - SenderProfiles
      responses:
        "200":
          description: Default sender profile returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenderProfile"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/sender-profiles/{id}:
    get:
      operationId: getSenderProfile
      summary: Gets a sender profile by id
      tags:
        - SenderProfiles
      parameters:
        - $ref: "#/components/parameters/SenderProfileId"
      responses:
        "200":
          description: Sender profile returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenderProfile"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateSenderProfile
      summary: Updates a sender profile
      tags:
        - SenderProfiles
      parameters:
        - $ref: "#/components/parameters/SenderProfileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSenderProfileRequest"
      responses:
        "200":
          description: Sender profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenderProfile"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: deactivateSenderProfile
      summary: Deactivates a sender profile
      tags:
        - SenderProfiles
      parameters:
        - $ref: "#/components/parameters/SenderProfileId"
      responses:
        "204":
          description: Sender profile deactivated successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/templates:
    get:
      operationId: listEmailTemplates
      summary: Lists email templates
      tags:
        - EmailTemplates
      parameters:
        - name: activeOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Email templates returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"
    post:
      operationId: createEmailTemplate
      summary: Creates an email template
      tags:
        - EmailTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmailTemplateRequest"
      responses:
        "201":
          description: Email template created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/templates/variables:
    get:
      operationId: listTemplateVariables
      summary: Lists supported template variables
      tags:
        - EmailTemplates
      responses:
        "200":
          description: Supported template variables returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateVariable"
  /api/v1/templates/{id}:
    get:
      operationId: getEmailTemplate
      summary: Gets an email template by id
      tags:
        - EmailTemplates
      parameters:
        - $ref: "#/components/parameters/EmailTemplateId"
      responses:
        "200":
          description: Email template returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateEmailTemplate
      summary: Updates an email template
      tags:
        - EmailTemplates
      parameters:
        - $ref: "#/components/parameters/EmailTemplateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailTemplateRequest"
      responses:
        "200":
          description: Email template updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: deactivateEmailTemplate
      summary: Deactivates an email template
      tags:
        - EmailTemplates
      parameters:
        - $ref: "#/components/parameters/EmailTemplateId"
      responses:
        "204":
          description: Email template deactivated successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/templates/{id}/attachments/{attachmentId}:
    post:
      operationId: assignDefaultTemplateAttachment
      summary: Assigns a default attachment to an email template
      tags:
        - EmailTemplates
      parameters:
        - $ref: "#/components/parameters/EmailTemplateId"
        - $ref: "#/components/parameters/AttachmentAssetIdInTemplate"
      responses:
        "200":
          description: Default attachment assigned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: removeDefaultTemplateAttachment
      summary: Removes a default attachment from an email template
      tags:
        - EmailTemplates
      parameters:
        - $ref: "#/components/parameters/EmailTemplateId"
        - $ref: "#/components/parameters/AttachmentAssetIdInTemplate"
      responses:
        "200":
          description: Default attachment removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/attachments:
    get:
      operationId: listAttachmentAssets
      summary: Lists attachment assets
      tags:
        - AttachmentAssets
      parameters:
        - name: activeOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Attachment assets returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttachmentAsset"
    post:
      operationId: uploadAttachmentAsset
      summary: Uploads an attachment asset
      tags:
        - AttachmentAssets
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - file
              properties:
                name:
                  type: string
                  example: Service brochure
                description:
                  type: string
                  nullable: true
                  example: General introduction document.
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Attachment asset uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentAsset"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/attachments/{id}:
    get:
      operationId: getAttachmentAsset
      summary: Gets an attachment asset by id
      tags:
        - AttachmentAssets
      parameters:
        - $ref: "#/components/parameters/AttachmentAssetId"
      responses:
        "200":
          description: Attachment asset returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentAsset"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateAttachmentAsset
      summary: Updates attachment metadata and active state
      tags:
        - AttachmentAssets
      parameters:
        - $ref: "#/components/parameters/AttachmentAssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttachmentAssetRequest"
      responses:
        "200":
          description: Attachment asset updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentAsset"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: deactivateAttachmentAsset
      summary: Deactivates an attachment asset
      tags:
        - AttachmentAssets
      parameters:
        - $ref: "#/components/parameters/AttachmentAssetId"
      responses:
        "204":
          description: Attachment asset deactivated successfully
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/drafts/generate:
    post:
      operationId: generateEmailDrafts
      summary: Generates personalized email drafts
      tags:
        - EmailDrafts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateEmailDraftsRequest"
      responses:
        "200":
          description: Draft generation completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateEmailDraftsResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/drafts:
    get:
      operationId: listEmailDrafts
      summary: Lists generated email drafts
      tags:
        - EmailDrafts
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EmailDraftStatus"
        - name: contactId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Email drafts returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailDraft"
  /api/v1/drafts/{id}:
    get:
      operationId: getEmailDraft
      summary: Gets an email draft by id
      tags:
        - EmailDrafts
      parameters:
        - $ref: "#/components/parameters/EmailDraftId"
      responses:
        "200":
          description: Email draft returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateEmailDraft
      summary: Updates draft subject and body before approval
      tags:
        - EmailDrafts
      parameters:
        - $ref: "#/components/parameters/EmailDraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailDraftRequest"
      responses:
        "200":
          description: Email draft updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/drafts/{id}/approve:
    post:
      operationId: approveEmailDraft
      summary: Approves an email draft
      tags:
        - EmailDrafts
      parameters:
        - $ref: "#/components/parameters/EmailDraftId"
      responses:
        "200":
          description: Email draft approved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/drafts/{id}/cancel:
    post:
      operationId: cancelEmailDraft
      summary: Cancels an email draft
      tags:
        - EmailDrafts
      parameters:
        - $ref: "#/components/parameters/EmailDraftId"
      responses:
        "200":
          description: Email draft cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/drafts/{id}/send:
    post:
      operationId: sendApprovedEmailDraft
      summary: Sends an approved email draft using the configured provider
      tags:
        - EmailDrafts
      parameters:
        - $ref: "#/components/parameters/EmailDraftId"
      responses:
        "200":
          description: Email draft send attempt processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/follow-ups:
    get:
      operationId: listFollowUpTasks
      summary: Lists follow-up tasks with optional filters
      tags:
        - FollowUps
      parameters:
        - name: contactId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: isCompleted
          in: query
          required: false
          schema:
            type: boolean
        - name: dueFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: dueTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Follow-up tasks returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUpTask"
    post:
      operationId: createFollowUpTask
      summary: Creates a follow-up task
      tags:
        - FollowUps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowUpTaskRequest"
      responses:
        "201":
          description: Follow-up task created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpTask"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/follow-ups/{id}:
    get:
      operationId: getFollowUpTask
      summary: Gets a follow-up task by id
      tags:
        - FollowUps
      parameters:
        - $ref: "#/components/parameters/FollowUpTaskId"
      responses:
        "200":
          description: Follow-up task returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpTask"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: updateFollowUpTask
      summary: Updates a follow-up task
      tags:
        - FollowUps
      parameters:
        - $ref: "#/components/parameters/FollowUpTaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFollowUpTaskRequest"
      responses:
        "200":
          description: Follow-up task updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpTask"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/follow-ups/{id}/complete:
    post:
      operationId: completeFollowUpTask
      summary: Marks a follow-up task as completed
      tags:
        - FollowUps
      parameters:
        - $ref: "#/components/parameters/FollowUpTaskId"
      responses:
        "200":
          description: Follow-up task completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpTask"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/contact-imports/preview:
    post:
      operationId: previewContactImport
      summary: Parses CSV content and returns preview validation without persisting contacts
      tags:
        - ContactImports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactImportPreviewRequest"
      responses:
        "200":
          description: Import preview returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactImportPreviewResult"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/contact-imports/commit:
    post:
      operationId: commitContactImport
      summary: Commits a CSV import and creates valid non-duplicate contacts
      tags:
        - ContactImports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactImportCommitRequest"
      responses:
        "200":
          description: Import committed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactImportCommitResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/contact-imports/jobs:
    get:
      operationId: listContactImportJobs
      summary: Lists contact import jobs for audit and traceability
      tags:
        - ContactImports
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
      responses:
        "200":
          description: Import jobs returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportJob"
